
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { font-family: var(--font-sans); min-height: 500px; position: relative; }

.drop-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(55,138,221,0.12);
  border: 3px dashed #378ADD;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.drop-overlay.active { opacity: 1; }
.drop-msg { font-size: 22px; font-weight: 500; color: #185FA5; background: #E6F1FB; padding: 1.2rem 2.5rem; border-radius: 16px; }

.welcome {
  padding: 3rem 1rem;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 360px; gap: 1.5rem;
}
.welcome-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.slot-card {
  width: 220px; height: 180px;
  border: 1.5px dashed var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  background: var(--color-background-secondary);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.2s, background 0.2s; gap: 8px;
}
.slot-card:hover { border-color: #378ADD; background: #E6F1FB; }
.slot-card svg { opacity: 0.35; }
.slot-card span { font-size: 13px; color: var(--color-text-secondary); }
.slot-num { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
.welcome-hint { font-size: 13px; color: var(--color-text-tertiary); }

.workspace { display: none; padding: 0; }

.images-row { display: grid; gap: 12px; grid-template-columns: 1fr; }
.images-row.two { grid-template-columns: 1fr 1fr; }

.img-slot {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-tertiary);
  overflow: hidden; position: relative;
  min-height: 180px; display: flex; align-items: center; justify-content: center;
}
.img-slot canvas { display: block; max-width: 100%; cursor: crosshair; }
.slot-label {
  position: absolute; top: 8px; left: 8px;
  font-size: 11px; font-weight: 500; padding: 3px 8px;
  border-radius: 4px; background: rgba(0,0,0,0.45); color: #fff;
  pointer-events: none;
}
.add-slot-btn {
  width: 100%; padding: 10px;
  border: 1.5px dashed var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  background: transparent; cursor: pointer; font-size: 13px;
  color: var(--color-text-secondary); transition: background 0.2s; margin-bottom: 10px;
}
.add-slot-btn:hover { background: var(--color-background-secondary); }

.zoom-strip {
  position: absolute; bottom: 8px; right: 8px;
  width: 72px; height: 72px; border-radius: 8px;
  border: 1.5px solid rgba(255,255,255,0.8);
  overflow: hidden; pointer-events: none; display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.zoom-strip canvas { width: 72px; height: 72px; image-rendering: pixelated; }

.bottom-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
@media (max-width: 640px) { .bottom-panel { grid-template-columns: 1fr; } .images-row.two { grid-template-columns: 1fr; } }

.panel {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 0.85rem;
}
.panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.panel-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-tertiary); }
.lock-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  border: 0.5px solid var(--color-border-secondary);
  background: transparent; cursor: pointer; color: var(--color-text-secondary); transition: background 0.15s;
}
.lock-btn.locked { background: #185FA5; color: #fff; border-color: #185FA5; }
.locked-badge { display: none; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #185FA5; color: #fff; margin-left: 6px; }
.locked-badge.show { display: inline-block; }

.color-swatch { width: 100%; height: 44px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); margin-bottom: 8px; background: #ccc; transition: background 0.05s; }
.rgb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.rgb-item { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px; text-align: center; }
.rgb-label { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; }
.rgb-value { font-size: 18px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }
.rgb-bar-track { height: 3px; background: var(--color-border-tertiary); border-radius: 2px; margin-top: 4px; }
.rgb-bar { height: 3px; border-radius: 2px; transition: width 0.05s; }
.hex-row { margin-top: 8px; display: flex; gap: 6px; align-items: center; }
.hex-box {
  flex: 1; background: var(--color-background-secondary);
  border-radius: var(--border-radius-md); padding: 6px 10px;
  font-size: 13px; font-family: var(--font-mono); font-weight: 500;
  color: var(--color-text-primary); cursor: pointer;
  border: 0.5px solid var(--color-border-tertiary); transition: background 0.15s;
}
.hex-box:hover { background: var(--color-background-tertiary); }
.copy-btn {
  font-size: 12px; padding: 5px 10px; border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: transparent; color: var(--color-text-secondary); cursor: pointer;
}
.copy-btn:hover { background: var(--color-background-secondary); }
.hsl-row {
  margin-top: 6px; font-size: 12px; color: var(--color-text-secondary);
  font-family: var(--font-mono); background: var(--color-background-secondary);
  border-radius: var(--border-radius-md); padding: 5px 10px;
}
.pos-info { font-size: 11px; color: var(--color-text-tertiary); margin-top: 5px; font-family: var(--font-mono); }

.hist-panel { padding: 0.85rem; }
canvas.hc { width: 100%; display: block; }
.hist-legend { display: flex; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
.hist-leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--color-text-secondary); }
.hist-dot { width: 8px; height: 8px; border-radius: 50%; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.stat-item { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; }
.stat-label { font-size: 11px; color: var(--color-text-tertiary); }
.stat-value { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-top: 2px; }

/* ── Poster AI panel ── */
.poster-panel {
  margin-top: 10px;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 0.85rem;
}
.poster-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.suggest-btn {
  font-size: 12px; padding: 5px 14px;
  border-radius: 20px; border: 0.5px solid #378ADD;
  background: #E6F1FB; color: #185FA5;
  cursor: pointer; font-weight: 500; transition: background 0.15s;
}
.suggest-btn:hover { background: #B5D4F4; }
.suggest-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.locked-colors-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center;
}
.lc-chip {
  display: flex; align-items: center; gap: 6px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 20px; padding: 3px 10px 3px 6px;
  background: var(--color-background-secondary); font-size: 12px;
  font-family: var(--font-mono); color: var(--color-text-secondary);
  cursor: pointer; transition: border-color 0.15s;
}
.lc-chip.selected { border-color: #378ADD; background: #E6F1FB; color: #185FA5; }
.lc-dot { width: 14px; height: 14px; border-radius: 50%; border: 0.5px solid var(--color-border-tertiary); flex-shrink: 0; }
.lc-hint { font-size: 12px; color: var(--color-text-tertiary); }

.poster-results { display: flex; flex-direction: column; gap: 12px; }
.poster-card {
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
}
.poster-palette { display: flex; height: 48px; }
.palette-swatch { flex: 1; }
.poster-body { padding: 10px 12px; }
.poster-genre {
  font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--color-text-tertiary); margin-bottom: 4px;
}
.poster-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.poster-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }
.poster-hexes { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.poster-hex-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-family: var(--font-mono);
  color: var(--color-text-secondary);
  background: var(--color-background-secondary);
  border-radius: 4px; padding: 2px 7px;
  cursor: pointer; border: 0.5px solid var(--color-border-tertiary);
}
.poster-hex-chip:hover { background: var(--color-background-tertiary); }
.phc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.ai-loading { text-align: center; padding: 2rem; }
.ai-spinner {
  width: 28px; height: 28px; border: 2.5px solid var(--color-border-secondary);
  border-top-color: #378ADD; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ai-loading p { font-size: 13px; color: var(--color-text-secondary); }
.ai-error { font-size: 13px; color: var(--color-text-danger, #E24B4A); padding: 1rem; text-align: center; }
</style>

<input type="file" id="fi0" accept="image/*" style="display:none" onchange="onFile(0,this)">
<input type="file" id="fi1" accept="image/*" style="display:none" onchange="onFile(1,this)">

<script>
const slots=[null,null], imgDatas=[null,null], origImgs=[null,null], imgDims=[{w:0,h:0},{w:0,h:0}], histData=[null,null];
let locked=false;
const lockedColors=[];
const selectedForPoster=new Set();

function triggerFile(i){document.getElementById('fi'+i).click();}
function nextSlot(){return slots[0]?1:0;}

function onFile(i,inp){
  const f=inp.files[0]; if(!f)return;
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>loadSlot(i,img);
  img.src=url;
}

function loadSlot(i,img){
  origImgs[i]=img; imgDims[i]={w:img.naturalWidth,h:img.naturalHeight}; slots[i]=true;
  document.getElementById('welcome').style.display='none';
  document.getElementById('workspace').style.display='block';
  document.getElementById('slot'+i).style.display='flex';
  const row=document.getElementById('imagesRow');
  row.className=slots[0]&&slots[1]?'images-row two':'images-row';
  const canvas=document.getElementById('c'+i);
  renderCanvas(i,canvas); setupMouseEvents(i,canvas); buildHistData(i,canvas);
  if(i===parseInt(document.getElementById('histSelect').value))redrawHist();
  document.getElementById('addImgBtn').style.display=(slots[0]&&slots[1])?'none':'block';
}

function renderCanvas(i,canvas){
  const wrap=document.getElementById('slot'+i);
  const maxW=wrap.offsetWidth-2||500, maxH=380;
  const {w,h}=imgDims[i];
  const scale=Math.min(maxW/w,maxH/h,1);
  canvas.width=Math.round(w*scale); canvas.height=Math.round(h*scale);
  const ctx=canvas.getContext('2d');
  ctx.drawImage(origImgs[i],0,0,canvas.width,canvas.height);
  imgDatas[i]=ctx.getImageData(0,0,canvas.width,canvas.height);
}

function setupMouseEvents(i,canvas){
  canvas.addEventListener('mousemove',e=>{
    if(locked)return;
    const {cx,cy,rx,ry}=getCanvasPos(e,canvas,i);
    if(cx<0||cy<0||cx>=canvas.width||cy>=canvas.height)return;
    const idx=(cy*canvas.width+cx)*4, d=imgDatas[i].data;
    updatePanel(d[idx],d[idx+1],d[idx+2],rx,ry,i+1);
    drawZoom(i,canvas,cx,cy);
  });
  canvas.addEventListener('click',e=>{
    const {cx,cy,rx,ry}=getCanvasPos(e,canvas,i);
    if(cx<0||cy<0||cx>=canvas.width||cy>=canvas.height)return;
    const idx=(cy*canvas.width+cx)*4, d=imgDatas[i].data;
    const r=d[idx],g=d[idx+1],b=d[idx+2];
    const hex='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();
    updatePanel(r,g,b,rx,ry,i+1);
    locked=true;
    document.getElementById('lockBtn').className='lock-btn locked';
    document.getElementById('lockBtn').textContent='クリックで解除';
    document.getElementById('lockedBadge').className='locked-badge show';
    addLockedColor(hex);
  });
  canvas.addEventListener('mouseleave',()=>{ document.getElementById('zoom'+i).style.display='none'; });
  canvas.addEventListener('mouseenter',()=>{ if(imgDatas[i])document.getElementById('zoom'+i).style.display='block'; });
}

function getCanvasPos(e,canvas,i){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const cx=Math.floor((e.clientX-rect.left)*sx);
  const cy=Math.floor((e.clientY-rect.top)*sy);
  return {cx,cy,rx:Math.round(cx*(imgDims[i].w/canvas.width)),ry:Math.round(cy*(imgDims[i].h/canvas.height))};
}

function addLockedColor(hex){
  if(lockedColors.includes(hex))return;
  if(lockedColors.length>=8)lockedColors.shift();
  lockedColors.push(hex);
  selectedForPoster.add(hex);
  renderLockedChips();
}

function renderLockedChips(){
  const row=document.getElementById('lockedColorsRow');
  document.getElementById('lcHint').style.display=lockedColors.length?'none':'inline';
  const chips=row.querySelectorAll('.lc-chip');
  chips.forEach(c=>c.remove());
  lockedColors.forEach(hex=>{
    const chip=document.createElement('div');
    chip.className='lc-chip'+(selectedForPoster.has(hex)?' selected':'');
    chip.innerHTML=`<div class="lc-dot" style="background:${hex}"></div>${hex}`;
    chip.onclick=()=>{
      if(selectedForPoster.has(hex))selectedForPoster.delete(hex);
      else selectedForPoster.add(hex);
      renderLockedChips();
      document.getElementById('suggestBtn').disabled=selectedForPoster.size===0;
    };
    row.appendChild(chip);
  });
  document.getElementById('suggestBtn').disabled=selectedForPoster.size===0;
}

function toggleLock(){
  locked=!locked;
  const btn=document.getElementById('lockBtn'), badge=document.getElementById('lockedBadge');
  if(locked){btn.className='lock-btn locked';btn.textContent='クリックで解除';badge.className='locked-badge show';}
  else{btn.className='lock-btn';btn.textContent='クリックでロック';badge.className='locked-badge';}
}

function updatePanel(r,g,b,x,y,slotNum){
  document.getElementById('colorSwatch').style.background=`rgb(${r},${g},${b})`;
  document.getElementById('rV').textContent=r;
  document.getElementById('gV').textContent=g;
  document.getElementById('bV').textContent=b;
  document.getElementById('rB').style.width=Math.round(r/255*100)+'%';
  document.getElementById('gB').style.width=Math.round(g/255*100)+'%';
  document.getElementById('bB').style.width=Math.round(b/255*100)+'%';
  const hex='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();
  document.getElementById('hexBox').textContent=hex;
  const hsl=rgbToHsl(r,g,b);
  document.getElementById('hslRow').textContent=`HSL: ${hsl[0]}° ${hsl[1]}% ${hsl[2]}%`;
  document.getElementById('posInfo').textContent=`画像${slotNum}  座標: (${x}, ${y})`;
}

function copyHex(){
  const hex=document.getElementById('hexBox').textContent;
  if(hex&&hex!=='#——————'){
    navigator.clipboard.writeText(hex).catch(()=>{});
    const btn=document.getElementById('copyBtn');
    btn.textContent='✓ コピー済み';
    setTimeout(()=>btn.textContent='コピー',1500);
  }
}

function drawZoom(i,canvas,cx,cy){
  const zc=document.getElementById('zc'+i), zCtx=zc.getContext('2d');
  zCtx.imageSmoothingEnabled=false; zCtx.clearRect(0,0,72,72);
  zCtx.drawImage(canvas,cx-9,cy-9,18,18,0,0,72,72);
  zCtx.strokeStyle='rgba(255,255,255,0.9)'; zCtx.lineWidth=1.5;
  zCtx.strokeRect(28,28,16,16);
}

function buildHistData(i,canvas){
  const d=imgDatas[i].data;
  const rH=new Float32Array(256),gH=new Float32Array(256),bH=new Float32Array(256),lH=new Float32Array(256);
  let tot=0; const px=d.length/4;
  for(let j=0;j<d.length;j+=4){
    rH[d[j]]++;gH[d[j+1]]++;bH[d[j+2]]++;
    const l=Math.round(0.299*d[j]+0.587*d[j+1]+0.114*d[j+2]);
    lH[l]++;tot+=l;
  }
  histData[i]={rH,gH,bH,lH,bright:Math.round(tot/px)};
  updateStats(imgDims[i].w,imgDims[i].h,histData[i].bright);
}

function updateStats(w,h,br){
  document.getElementById('sW').textContent=w+'px';
  document.getElementById('sH').textContent=h+'px';
  const gcd=(a,b)=>b?gcd(b,a%b):a; const d=gcd(w,h);
  document.getElementById('sAR').textContent=(w/d)+':'+(h/d);
  document.getElementById('sBr').textContent=br;
}

function redrawHist(){
  const sel=parseInt(document.getElementById('histSelect').value);
  const hc=document.getElementById('histCanvas'), hCtx=hc.getContext('2d');
  const w=hc.offsetWidth||260; hc.width=w; hc.height=100;
  hCtx.clearRect(0,0,w,100);
  if(!histData[sel])return;
  const {rH,gH,bH,lH}=histData[sel];
  const maxV=Math.max(...rH,...gH,...bH,...lH);
  const bw=w/256;
  const chs=[{h:lH,c:'rgba(136,135,128,0.4)'},{h:rH,c:'rgba(226,75,74,0.55)'},{h:gH,c:'rgba(99,153,34,0.55)'},{h:bH,c:'rgba(55,138,221,0.55)'}];
  for(const ch of chs){
    hCtx.beginPath(); hCtx.moveTo(0,100);
    for(let i=0;i<256;i++) hCtx.lineTo(i*bw+bw/2,100-(ch.h[i]/maxV)*95);
    hCtx.lineTo(w,100); hCtx.closePath(); hCtx.fillStyle=ch.c; hCtx.fill();
  }
  if(histData[sel])updateStats(imgDims[sel].w,imgDims[sel].h,histData[sel].bright);
}

function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}
  else{
    const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
  }
  return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

async function runSuggest(){
  const colors=Array.from(selectedForPoster);
  if(!colors.length)return;
  const btn=document.getElementById('suggestBtn');
  btn.disabled=true; btn.textContent='生成中...';
  const res=document.getElementById('posterResults');
  res.innerHTML='<div class="ai-loading"><div class="ai-spinner"></div><p>AIが配色を分析中...</p></div>';

  const prompt=`あなたは映画ポスターのプロのカラーデザイナーです。
以下のカラーコードを参考にして、映画ポスターの配色パターンを3つ提案してください。

入力カラー: ${colors.join(', ')}

各提案について、以下のJSON形式で返してください（JSON以外のテキストは一切不要）:
[
  {
    "genre": "ジャンル（例: サスペンス、SF、ロマンス、アクション、ホラーなど）",
    "title": "架空の映画タイトル（日本語）",
    "description": "この配色の雰囲気と効果の説明（60文字以内）",
    "colors": [
      {"hex": "#XXXXXX", "role": "背景色"},
      {"hex": "#XXXXXX", "role": "メインカラー"},
      {"hex": "#XXXXXX", "role": "アクセントカラー"},
      {"hex": "#XXXXXX", "role": "テキスト色"},
      {"hex": "#XXXXXX", "role": "補助色"}
    ]
  }
]
入力カラーを必ず1色以上各提案に含めること。JSON配列のみ返すこと。`;

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await response.json();
    const text=data.content.map(c=>c.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const proposals=JSON.parse(clean);
    renderPosterCards(proposals);
  }catch(e){
    res.innerHTML=`<div class="ai-error">エラーが発生しました。もう一度お試しください。</div>`;
  }
  btn.disabled=false; btn.textContent='AIに提案させる';
}

function renderPosterCards(proposals){
  const res=document.getElementById('posterResults');
  res.innerHTML='';
  proposals.forEach(p=>{
    const card=document.createElement('div');
    card.className='poster-card';
    const palette=p.colors.map(c=>`<div class="palette-swatch" style="background:${c.hex}" title="${c.role}: ${c.hex}"></div>`).join('');
    const hexChips=p.colors.map(c=>`
      <div class="poster-hex-chip" onclick="copyColorHex('${c.hex}',this)" title="${c.role}">
        <div class="phc-dot" style="background:${c.hex}"></div>${c.hex}
      </div>`).join('');
    card.innerHTML=`
      <div class="poster-palette">${palette}</div>
      <div class="poster-body">
        <div class="poster-genre">${p.genre}</div>
        <div class="poster-title">${p.title}</div>
        <div class="poster-desc">${p.description}</div>
        <div class="poster-hexes">${hexChips}</div>
      </div>`;
    res.appendChild(card);
  });
}

function copyColorHex(hex,el){
  navigator.clipboard.writeText(hex).catch(()=>{});
  const orig=el.innerHTML;
  el.style.background='var(--color-background-info,#E6F1FB)';
  el.style.color='#185FA5';
  setTimeout(()=>{ el.style.background=''; el.style.color=''; },1000);
}

document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dropOverlay').classList.add('active');});
document.addEventListener('dragleave',e=>{if(e.relatedTarget===null)document.getElementById('dropOverlay').classList.remove('active');});
document.addEventListener('drop',e=>{
  e.preventDefault();
  document.getElementById('dropOverlay').classList.remove('active');
  const f=e.dataTransfer.files[0];
  if(!f||!f.type.startsWith('image/'))return;
  const slot=slots[0]?(slots[1]?0:1):0;
  const img=new Image(), url=URL.createObjectURL(f);
  img.onload=()=>loadSlot(slot,img);
  img.src=url;
});

window.addEventListener('resize',()=>{
  for(let i=0;i<2;i++){
    if(origImgs[i]){ const c=document.getElementById('c'+i); renderCanvas(i,c); buildHistData(i,c); }
  }
  redrawHist();
});
</script>
